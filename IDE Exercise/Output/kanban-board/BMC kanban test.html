<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highveld-GTS — Kanban Project Board</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#fff;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;
  --cat-marketing:#3B82F6;--cat-operations:#10B981;--cat-tech:#8B5CF6;
  --cat-finance:#F59E0B;--cat-partnerships:#06B6D4;--cat-hr:#EC4899;
  --pri-high:#EF4444;--pri-medium:#F59E0B;--pri-low:#22C55E;
  --col-backlog:#f8fafc;--col-todo:#eff6ff;--col-progress:#f0fdf4;--col-review:#fefce8;--col-done:#f0fdfa;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.header h1 span{color:#38bdf8;font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:rgba(255,255,255,.1);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.875rem;font-weight:500;transition:background .15s}
.nav-tab:hover{background:rgba(255,255,255,.2)}
.nav-tab.active{background:#3b82f6}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-warning{background:#f59e0b;color:#fff}.btn-warning:hover{background:#d97706}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#64748b;color:#fff}.btn-secondary:hover{background:#475569}

/* ===== BOARD ===== */
.panel{display:none;padding:16px 20px;overflow-x:auto}
.panel.active{display:block}
.board{display:flex;gap:14px;min-height:calc(100vh - 120px);align-items:flex-start}
.column{background:var(--surface);border-radius:10px;min-width:260px;width:260px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.column-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;background:var(--surface);border-radius:10px 10px 0 0;z-index:1}
.column-header .count{background:var(--bg);padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;color:var(--text-light)}
.column-body{padding:8px;flex:1;overflow-y:auto;min-height:80px}
.column-body.drag-over{background:#dbeafe;border-radius:0 0 10px 10px}
.column[data-col="backlog"] .column-header{border-top:3px solid #94a3b8}
.column[data-col="todo"] .column-header{border-top:3px solid #3b82f6}
.column[data-col="progress"] .column-header{border-top:3px solid #10b981}
.column[data-col="review"] .column-header{border-top:3px solid #f59e0b}
.column[data-col="done"] .column-header{border-top:3px solid #8b5cf6}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:grab;transition:box-shadow .15s,transform .15s;position:relative;border-left:4px solid transparent}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.dragging{opacity:.4;transform:rotate(2deg)}
.card-title{font-size:.85rem;font-weight:600;margin-bottom:6px;padding-right:4px}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;font-size:.7rem}
.badge{padding:2px 7px;border-radius:4px;font-weight:600;color:#fff;white-space:nowrap}
.badge-cat{opacity:.9}.badge-pri{opacity:.85}
.card-role{font-size:.72rem;color:var(--text-light);margin-top:5px}
.card-effort{font-size:.7rem;color:var(--text-light);margin-top:2px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1.05rem}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light);padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:var(--text-light)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.875rem;font-family:inherit}
.form-group textarea{min-height:70px;resize:vertical}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ===== RISK LOG ===== */
.risk-table-wrap{overflow-x:auto}
.risk-table{width:100%;border-collapse:collapse;font-size:.85rem}
.risk-table th,.risk-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.risk-table th{background:var(--bg);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
.risk-table tr:hover td{background:#f8fafc}
.impact-high,.likelihood-high{color:#ef4444;font-weight:600}
.impact-medium,.likelihood-medium{color:#f59e0b;font-weight:600}
.impact-low,.likelihood-low{color:#22c55e;font-weight:600}
.risk-actions{display:flex;gap:4px}
.btn-icon{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;transition:background .15s}
.btn-icon.edit{background:#eff6ff;color:#3b82f6}.btn-icon.edit:hover{background:#dbeafe}
.btn-icon.delete{background:#fef2f2;color:#ef4444}.btn-icon.delete:hover{background:#fee2e2}

/* ===== MILESTONES ===== */
.milestone-list{display:flex;flex-direction:column;gap:10px;max-width:900px}
.milestone-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;transition:border-color .15s}
.milestone-item.completed{border-color:#10b981;background:#f0fdf4}
.milestone-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:.85rem;color:#fff;transition:all .15s}
.milestone-item.completed .milestone-check{background:#10b981;border-color:#10b981}
.milestone-info{flex:1}
.milestone-name{font-weight:700;font-size:.95rem;margin-bottom:2px}
.milestone-desc{font-size:.82rem;color:var(--text-light)}
.milestone-progress{font-size:.75rem;color:var(--text-light);margin-top:4px}
.milestone-progress-bar{width:100%;height:6px;background:var(--bg);border-radius:3px;margin-top:4px;overflow:hidden}
.milestone-progress-fill{height:100%;background:#10b981;border-radius:3px;transition:width .3s}
.milestone-cards{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.milestone-card-tag{font-size:.7rem;padding:2px 6px;background:var(--bg);border-radius:4px;color:var(--text-light)}
.milestone-card-tag.done{background:#d1fae5;color:#065f46}

/* ===== UTILITIES ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light);font-size:.9rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:1.1rem;font-weight:700}
#fileInput{display:none}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Highveld-GTS <span>Kanban Board</span></h1>
  <div class="nav-tabs">
    <button class="nav-tab active" data-panel="board">Board</button>
    <button class="nav-tab" data-panel="risks">Risk Log</button>
    <button class="nav-tab" data-panel="milestones">Milestones</button>
  </div>
  <div class="header-actions">
    <button class="btn btn-success" onclick="addCard()">+ Add Card</button>
    <button class="btn btn-primary" onclick="exportBoard()">Export</button>
    <button class="btn btn-warning" onclick="importBoard()">Import</button>
    <button class="btn btn-danger" onclick="resetBoard()">Reset</button>
    <input type="file" id="fileInput" accept=".json" onchange="handleImport(event)">
  </div>
</div>

<!-- BOARD PANEL -->
<div class="panel active" id="panel-board">
  <div class="board" id="board"></div>
</div>

<!-- RISK LOG PANEL -->
<div class="panel" id="panel-risks">
  <div class="section-header">
    <h2>Project Risk Log</h2>
    <button class="btn btn-success" onclick="addRisk()">+ Add Risk</button>
  </div>
  <div class="risk-table-wrap">
    <table class="risk-table">
      <thead><tr><th>Risk Description</th><th>Impact</th><th>Likelihood</th><th>Mitigation Strategy</th><th>Actions</th></tr></thead>
      <tbody id="riskBody"></tbody>
    </table>
  </div>
</div>

<!-- MILESTONES PANEL -->
<div class="panel" id="panel-milestones">
  <div class="section-header">
    <h2>Milestone Tracker</h2>
  </div>
  <div class="milestone-list" id="milestoneList"></div>
</div>

<!-- CARD MODAL -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="cardModalTitle">Card Details</h2>
      <button class="modal-close" onclick="closeCardModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cardId">
      <div class="form-group"><label>Title</label><input type="text" id="cardTitleInput"></div>
      <div class="form-group"><label>Description</label><textarea id="cardDescInput"></textarea></div>
      <div class="form-group"><label>Assigned Role</label>
        <select id="cardRoleInput">
          <option value="">— Select —</option>
          <option>Joanne Clarke — Project Lead</option>
          <option>Chris — Technology & AI Lead</option>
          <option>Peter — Web Developer</option>
          <option>Boitumelo — Photographer</option>
          <option>Praveen — Cultural Guide</option>
          <option>Thandi's Grandmother — Cultural Guide</option>
          <option>Professional Drivers</option>
          <option>External Provider</option>
        </select>
      </div>
      <div class="form-group"><label>Category</label>
        <select id="cardCatInput">
          <option value="Marketing">Marketing</option>
          <option value="Operations">Operations</option>
          <option value="Tech">Tech</option>
          <option value="Finance">Finance</option>
          <option value="Partnerships">Partnerships</option>
          <option value="HR/Admin">HR/Admin</option>
        </select>
      </div>
      <div class="form-group"><label>Estimated Effort (days)</label><input type="number" id="cardEffortInput" min="1"></div>
      <div class="form-group"><label>Priority</label>
        <select id="cardPriorityInput">
          <option value="Medium">Medium</option>
          <option value="High">High</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div class="form-group"><label>Due Date</label><input type="date" id="cardDueInput"></div>
      <div class="form-group"><label>Column</label>
        <select id="cardColInput">
          <option value="backlog">Backlog</option>
          <option value="todo">To Do</option>
          <option value="progress">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteCardBtn" onclick="deleteCard()">Delete</button>
      <button class="btn btn-secondary" onclick="closeCardModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- RISK MODAL -->
<div class="modal-overlay" id="riskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="riskModalTitle">Risk Details</h2>
      <button class="modal-close" onclick="closeRiskModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="riskId">
      <div class="form-group"><label>Risk Description</label><textarea id="riskDescInput"></textarea></div>
      <div class="form-group"><label>Potential Impact</label>
        <select id="riskImpactInput"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
      </div>
      <div class="form-group"><label>Likelihood</label>
        <select id="riskLikelihoodInput"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
      </div>
      <div class="form-group"><label>Mitigation Strategy</label><textarea id="riskMitigationInput"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeRiskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRisk()">Save</button>
    </div>
  </div>
</div>

    {id:id++,name:'Launch Day — First Experience Delivered',desc:'First paid cultural experience delivered successfully to a real guest',linkedCards:[36]},
    {id:id++,name:'Break-even Achieved',desc:'5 experiences per month sustained (target: Month 6)',linkedCards:[]},
    {id:id++,name:'Year 1 Target Reached',desc:'100 experiences delivered',linkedCards:[]},
  ];
}

// ===== STATE =====
let state = loadState();

function loadState(){
  try{
    const s = localStorage.getItem('hgts-kanban');
    if(s){return JSON.parse(s);}
  }catch(e){}
  return getDefaultState();
}

function getDefaultState(){
  return {cards:getDefaultCards(),risks:getDefaultRisks(),milestones:getDefaultMilestones()};
}

function saveState(){
  localStorage.setItem('hgts-kanban',JSON.stringify(state));
}

// ===== RENDER BOARD =====
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLUMNS.forEach(col=>{
    const cards = state.cards.filter(c=>c.col===col.id);
    const div = document.createElement('div');
    div.className = 'column';
    div.dataset.col = col.id;
    div.innerHTML = `
      <div class="column-header">${col.name} <span class="count">${cards.length}</span></div>
      <div class="column-body" data-col="${col.id}"></div>`;
    const body = div.querySelector('.column-body');
    // Drag events on column body
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{
      e.preventDefault();body.classList.remove('drag-over');
      const cardId = parseInt(e.dataTransfer.getData('text/plain'));
      const card = state.cards.find(c=>c.id===cardId);
      if(card){card.col=col.id;saveState();renderBoard();renderMilestones();}
    });
    cards.forEach(card=>{
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.style.borderLeftColor = CAT_COLORS[card.cat]||'#94a3b8';
      el.dataset.id = card.id;
      el.innerHTML = `
        <div class="card-title">${esc(card.title)}</div>
        <div class="card-meta">
          <span class="badge badge-cat" style="background:${CAT_COLORS[card.cat]||'#94a3b8'}">${esc(card.cat)}</span>
          <span class="badge badge-pri" style="background:${PRI_COLORS[card.priority]||'#94a3b8'}">${esc(card.priority)}</span>
        </div>
        ${card.role?`<div class="card-role">${esc(card.role)}</div>`:''}
        ${card.effort?`<div class="card-effort">${card.effort} day${card.effort>1?'s':''}</div>`:''}`;
      el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',card.id);el.classList.add('dragging');});
      el.addEventListener('dragend',()=>el.classList.remove('dragging'));
      el.addEventListener('click',()=>openCardModal(card.id));
      body.appendChild(el);
    });
    board.appendChild(div);
  });
}

// ===== CARD MODAL =====
function openCardModal(cardId){
  const card = cardId ? state.cards.find(c=>c.id===cardId) : null;
  document.getElementById('cardModalTitle').textContent = card ? 'Edit Card' : 'Add Card';
  document.getElementById('deleteCardBtn').style.display = card ? '' : 'none';
  document.getElementById('cardId').value = card ? card.id : '';
  document.getElementById('cardTitleInput').value = card ? card.title : '';
  document.getElementById('cardDescInput').value = card ? card.desc : '';
  document.getElementById('cardRoleInput').value = card ? card.role : '';
  document.getElementById('cardCatInput').value = card ? card.cat : 'Operations';
  document.getElementById('cardEffortInput').value = card ? card.effort : '';
  document.getElementById('cardPriorityInput').value = card ? card.priority : 'Medium';
  document.getElementById('cardDueInput').value = card ? card.due : '';
  document.getElementById('cardColInput').value = card ? card.col : 'backlog';
  document.getElementById('cardModal').classList.add('open');
}

function closeCardModal(){document.getElementById('cardModal').classList.remove('open');}

function saveCard(){
  const id = document.getElementById('cardId').value;
  const data = {
    title:document.getElementById('cardTitleInput').value.trim(),
    desc:document.getElementById('cardDescInput').value.trim(),
    role:document.getElementById('cardRoleInput').value,
    cat:document.getElementById('cardCatInput').value,
    effort:parseInt(document.getElementById('cardEffortInput').value)||0,
    priority:document.getElementById('cardPriorityInput').value,
    due:document.getElementById('cardDueInput').value,
    col:document.getElementById('cardColInput').value,
  };
  if(!data.title){alert('Title is required.');return;}
  if(id){
    const card = state.cards.find(c=>c.id===parseInt(id));
    if(card) Object.assign(card,data);
  }else{
    const maxId = state.cards.reduce((m,c)=>Math.max(m,c.id),0);
    state.cards.push({id:maxId+1,...data});
  }
  saveState();closeCardModal();renderBoard();renderMilestones();
}

function deleteCard(){
  const id = parseInt(document.getElementById('cardId').value);
  if(!id)return;
  if(!confirm('Delete this card?'))return;
  state.cards = state.cards.filter(c=>c.id!==id);
  // Also remove from milestones
  state.milestones.forEach(m=>{m.linkedCards = m.linkedCards.filter(cid=>cid!==id);});
  saveState();closeCardModal();renderBoard();renderMilestones();
}

function addCard(){openCardModal(null);}

// ===== RISK LOG =====
function renderRisks(){
  const body = document.getElementById('riskBody');
  if(state.risks.length===0){
    body.innerHTML='<tr><td colspan="5" class="empty-state">No risks logged. Click "+ Add Risk" to add one.</td></tr>';
    return;
  }
  body.innerHTML = state.risks.map(r=>`
    <tr>
      <td>${esc(r.desc)}</td>
      <td class="impact-${r.impact.toLowerCase()}">${r.impact}</td>
      <td class="likelihood-${r.likelihood.toLowerCase()}">${r.likelihood}</td>
      <td>${esc(r.mitigation)}</td>
      <td><div class="risk-actions">
        <button class="btn-icon edit" onclick="editRisk(${r.id})" title="Edit">&#9998;</button>
        <button class="btn-icon delete" onclick="deleteRisk(${r.id})" title="Delete">&times;</button>
      </div></td>
    </tr>`).join('');
}

function addRisk(){openRiskModal(null);}
function editRisk(id){openRiskModal(id);}

function openRiskModal(riskId){
  const risk = riskId ? state.risks.find(r=>r.id===riskId) : null;
  document.getElementById('riskModalTitle').textContent = risk ? 'Edit Risk' : 'Add Risk';
  document.getElementById('riskId').value = risk ? risk.id : '';
  document.getElementById('riskDescInput').value = risk ? risk.desc : '';
  document.getElementById('riskImpactInput').value = risk ? risk.impact : 'Medium';
  document.getElementById('riskLikelihoodInput').value = risk ? risk.likelihood : 'Medium';
  document.getElementById('riskMitigationInput').value = risk ? risk.mitigation : '';
  document.getElementById('riskModal').classList.add('open');
}

function closeRiskModal(){document.getElementById('riskModal').classList.remove('open');}

function saveRisk(){
  const id = document.getElementById('riskId').value;
  const data = {
    desc:document.getElementById('riskDescInput').value.trim(),
    impact:document.getElementById('riskImpactInput').value,
    likelihood:document.getElementById('riskLikelihoodInput').value,
    mitigation:document.getElementById('riskMitigationInput').value.trim(),
  };
  if(!data.desc){alert('Risk description is required.');return;}
  if(id){
    const risk = state.risks.find(r=>r.id===parseInt(id));
    if(risk) Object.assign(risk,data);
  }else{
    const maxId = state.risks.reduce((m,r)=>Math.max(m,r.id),0);
    state.risks.push({id:maxId+1,...data});
  }
  saveState();closeRiskModal();renderRisks();
}

function deleteRisk(id){
  if(!confirm('Delete this risk?'))return;
  state.risks = state.risks.filter(r=>r.id!==id);
  saveState();renderRisks();
}

// ===== MILESTONES =====
function renderMilestones(){
  const list = document.getElementById('milestoneList');
  if(state.milestones.length===0){
    list.innerHTML='<div class="empty-state">No milestones defined.</div>';
    return;
  }
  list.innerHTML = state.milestones.map(m=>{
    const linked = m.linkedCards||[];
    const total = linked.length;
    const doneCount = linked.filter(cid=>{const card=state.cards.find(c=>c.id===cid);return card&&card.col==='done';}).length;
    const pct = total>0?Math.round(doneCount/total*100):0;
    const isComplete = total>0 && doneCount===total;
    return `
    <div class="milestone-item${isComplete?' completed':''}">
      <div class="milestone-check">${isComplete?'&#10003;':''}</div>
      <div class="milestone-info">
        <div class="milestone-name">${esc(m.name)}</div>
        <div class="milestone-desc">${esc(m.desc)}</div>
        ${total>0?`
        <div class="milestone-progress">${doneCount} / ${total} cards done (${pct}%)</div>
        <div class="milestone-progress-bar"><div class="milestone-progress-fill" style="width:${pct}%"></div></div>
        <div class="milestone-cards">${linked.map(cid=>{
          const card=state.cards.find(c=>c.id===cid);
          const isDone=card&&card.col==='done';
          return card?`<span class="milestone-card-tag${isDone?' done':''}">${esc(card.title)}</span>`:'';
        }).join('')}</div>`:`<div class="milestone-progress" style="font-style:italic">No linked cards — manual milestone</div>`}
      </div>
    </div>`;
  }).join('');
}

// ===== EXPORT / IMPORT / RESET =====
function exportBoard(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'highveld-gts-kanban-export.json';
  a.click();URL.revokeObjectURL(a.href);
}

function importBoard(){document.getElementById('fileInput').click();}

function handleImport(e){
  const file = e.target.files[0];if(!file)return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const imported = JSON.parse(ev.target.result);
      if(!imported.cards||!imported.risks||!imported.milestones){throw new Error('Invalid format');}
      state = imported;
      saveState();renderAll();
      alert('Board imported successfully.');
    }catch(err){alert('Import failed: invalid JSON file.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function resetBoard(){
  if(!confirm('Reset the board to defaults? All changes will be lost.'))return;
  localStorage.removeItem('hgts-kanban');
  state = getDefaultState();
  saveState();renderAll();
}

// ===== NAV =====
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
  });
});

// ===== UTILS =====
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function renderAll(){renderBoard();renderRisks();renderMilestones();}

// ===== INIT =====
renderAll();
</script>
</body>
</html>
